name: Build & Release DemoService

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish self-contained
        run: dotnet publish -c Release -r win-x64 --self-contained -o ./publish

      - name: Zip artifact
        run: cd publish && zip -r ../DemoService.zip .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DemoService-${{ github.sha }}
          path: DemoService.zip

      - name: Create Release (on merge to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: DemoService.zip
          generate_release_notes: true
